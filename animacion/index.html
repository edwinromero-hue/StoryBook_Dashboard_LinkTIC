<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plexus Animation — Three.js</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    canvas {
      display: block;
    }

    /* Controls overlay */
    .controls {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .controls button {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      backdrop-filter: blur(10px);
    }

    .btn-record {
      background: rgba(220, 40, 40, 0.85);
      color: #fff;
    }

    .btn-record:hover {
      background: rgba(220, 40, 40, 1);
    }

    .btn-record.recording {
      background: rgba(220, 40, 40, 1);
      animation: pulse 1s infinite;
    }

    .btn-screenshot {
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
    }

    .btn-screenshot:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .status {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 20px;
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      border-radius: 8px;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 100;
      backdrop-filter: blur(10px);
    }

    .status.visible {
      opacity: 1;
    }

    .timer {
      position: fixed;
      top: 20px;
      left: 20px;
      color: #ff4444;
      font-size: 18px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .timer.visible {
      opacity: 1;
    }

    @keyframes pulse {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(220, 40, 40, 0.5);
      }

      50% {
        box-shadow: 0 0 0 10px rgba(220, 40, 40, 0);
      }
    }

    .settings {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 6px;
      background: rgba(0, 0, 0, 0.6);
      padding: 14px;
      border-radius: 10px;
      backdrop-filter: blur(10px);
      color: #fff;
      font-size: 12px;
    }

    .settings label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .settings select,
    .settings input[type="number"] {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
    }
  </style>
</head>

<body>

  <div class="controls">
    <button class="btn-record" id="btnRecord">Grabar MP4</button>
    <button class="btn-screenshot" id="btnScreenshot">Captura PNG</button>
  </div>

  <div class="timer" id="timer">00:00</div>
  <div class="status" id="status"></div>

  <div class="settings">
    <label>Duración (s): <input type="number" id="duration" value="10" min="3" max="60" style="width:55px"></label>
    <label>Resolución:
      <select id="resolution">
        <option value="1920x1080" selected>1920×1080</option>
        <option value="1280x720">1280×720</option>
        <option value="3840x2160">3840×2160 (4K)</option>
      </select>
    </label>
    <label>FPS:
      <select id="fps">
        <option value="30" selected>30</option>
        <option value="60">60</option>
      </select>
    </label>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/",
      "mp4-muxer": "https://unpkg.com/mp4-muxer@5.1.3/build/mp4-muxer.mjs"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { Muxer, ArrayBufferTarget } from 'mp4-muxer';

    // ─── Scene Setup ───
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf8fbff);
    scene.fog = new THREE.FogExp2(0xf8fbff, 0.008);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 45);

    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.5;

    // ─── Plexus Particles ───
    const PARTICLE_COUNT = 300;
    const SPREAD = 50;
    const CONNECTION_DISTANCE = 12;
    const MAX_CONNECTIONS = 800;

    const particlePositions = new Float32Array(PARTICLE_COUNT * 3);
    const particleVelocities = new Float32Array(PARTICLE_COUNT * 3);
    const particleSizes = new Float32Array(PARTICLE_COUNT);

    for (let i = 0; i < PARTICLE_COUNT; i++) {
      const i3 = i * 3;
      particlePositions[i3] = (Math.random() - 0.5) * SPREAD;
      particlePositions[i3 + 1] = (Math.random() - 0.5) * SPREAD;
      particlePositions[i3 + 2] = (Math.random() - 0.5) * SPREAD;

      particleVelocities[i3] = (Math.random() - 0.5) * 0.02;
      particleVelocities[i3 + 1] = (Math.random() - 0.5) * 0.02;
      particleVelocities[i3 + 2] = (Math.random() - 0.5) * 0.02;

      particleSizes[i] = Math.random() * 2.5 + 1.0;
    }

    // Particle dots
    const dotGeometry = new THREE.BufferGeometry();
    dotGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
    dotGeometry.setAttribute('size', new THREE.BufferAttribute(particleSizes, 1));

    const dotMaterial = new THREE.ShaderMaterial({
      uniforms: {
        uColor: { value: new THREE.Color(0x2a7fff) },
        uOpacity: { value: 0.9 }
      },
      vertexShader: `
        attribute float size;
        varying float vAlpha;
        void main() {
          vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
          gl_PointSize = size * (200.0 / -mvPosition.z);
          gl_Position = projectionMatrix * mvPosition;
          vAlpha = smoothstep(80.0, 10.0, -mvPosition.z);
        }
      `,
      fragmentShader: `
        uniform vec3 uColor;
        uniform float uOpacity;
        varying float vAlpha;
        void main() {
          float d = length(gl_PointCoord - 0.5);
          if (d > 0.5) discard;
          float alpha = smoothstep(0.5, 0.1, d) * vAlpha * uOpacity;
          gl_FragColor = vec4(uColor, alpha);
        }
      `,
      transparent: true,
      depthWrite: false,
      blending: THREE.NormalBlending
    });

    const dots = new THREE.Points(dotGeometry, dotMaterial);
    scene.add(dots);

    // Connection lines
    const linePositions = new Float32Array(MAX_CONNECTIONS * 2 * 3);
    const lineColors = new Float32Array(MAX_CONNECTIONS * 2 * 4);
    const lineGeometry = new THREE.BufferGeometry();
    lineGeometry.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));
    lineGeometry.setAttribute('color', new THREE.BufferAttribute(lineColors, 4));

    const lineMaterial = new THREE.LineBasicMaterial({
      vertexColors: true,
      transparent: true,
      blending: THREE.NormalBlending,
      depthWrite: false
    });

    const lines = new THREE.LineSegments(lineGeometry, lineMaterial);
    scene.add(lines);

    // ─── Mesh triangles (subtle fill) ───
    const trianglePositions = new Float32Array(MAX_CONNECTIONS * 3 * 3);
    const triangleColors = new Float32Array(MAX_CONNECTIONS * 3 * 4);
    const triGeometry = new THREE.BufferGeometry();
    triGeometry.setAttribute('position', new THREE.BufferAttribute(trianglePositions, 3));
    triGeometry.setAttribute('color', new THREE.BufferAttribute(triangleColors, 4));

    const triMaterial = new THREE.MeshBasicMaterial({
      vertexColors: true,
      transparent: true,
      side: THREE.DoubleSide,
      depthWrite: false,
      blending: THREE.NormalBlending
    });

    const triangles = new THREE.Mesh(triGeometry, triMaterial);
    scene.add(triangles);

    // ─── Ambient light for depth ───
    scene.add(new THREE.AmbientLight(0xffffff, 0.5));

    // ─── Recording state (must be before animate) ───
    let isRecording = false;
    let mediaRecorder = null;
    let recordedChunks = [];
    let recordStartTime = 0;
    let recordStartReal = 0;
    let timerInterval = null;

    // ─── Animation Loop ───
    const clock = new THREE.Clock();
    const halfSpread = SPREAD / 2;

    function updateConnections() {
      let lineIdx = 0;
      let triIdx = 0;
      const baseColor = new THREE.Color(0x3399ff);

      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const ix = particlePositions[i * 3];
        const iy = particlePositions[i * 3 + 1];
        const iz = particlePositions[i * 3 + 2];

        for (let j = i + 1; j < PARTICLE_COUNT; j++) {
          const jx = particlePositions[j * 3];
          const jy = particlePositions[j * 3 + 1];
          const jz = particlePositions[j * 3 + 2];

          const dx = ix - jx, dy = iy - jy, dz = iz - jz;
          const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);

          if (dist < CONNECTION_DISTANCE && lineIdx < MAX_CONNECTIONS) {
            const alpha = (1 - dist / CONNECTION_DISTANCE) * 0.35;
            const li = lineIdx * 6;
            linePositions[li] = ix; linePositions[li + 1] = iy; linePositions[li + 2] = iz;
            linePositions[li + 3] = jx; linePositions[li + 4] = jy; linePositions[li + 5] = jz;

            const ci = lineIdx * 8;
            lineColors[ci] = baseColor.r; lineColors[ci + 1] = baseColor.g; lineColors[ci + 2] = baseColor.b; lineColors[ci + 3] = alpha;
            lineColors[ci + 4] = baseColor.r; lineColors[ci + 5] = baseColor.g; lineColors[ci + 6] = baseColor.b; lineColors[ci + 7] = alpha * 0.5;

            lineIdx++;

            // Find a third particle to form triangles
            if (triIdx < MAX_CONNECTIONS) {
              for (let k = j + 1; k < PARTICLE_COUNT; k++) {
                const kx = particlePositions[k * 3];
                const ky = particlePositions[k * 3 + 1];
                const kz = particlePositions[k * 3 + 2];
                const dik = Math.sqrt((ix - kx) ** 2 + (iy - ky) ** 2 + (iz - kz) ** 2);
                const djk = Math.sqrt((jx - kx) ** 2 + (jy - ky) ** 2 + (jz - kz) ** 2);

                if (dik < CONNECTION_DISTANCE && djk < CONNECTION_DISTANCE && triIdx < MAX_CONNECTIONS) {
                  const maxDist = Math.max(dist, dik, djk);
                  const tAlpha = (1 - maxDist / CONNECTION_DISTANCE) * 0.06;
                  const ti = triIdx * 9;
                  trianglePositions[ti] = ix; trianglePositions[ti + 1] = iy; trianglePositions[ti + 2] = iz;
                  trianglePositions[ti + 3] = jx; trianglePositions[ti + 4] = jy; trianglePositions[ti + 5] = jz;
                  trianglePositions[ti + 6] = kx; trianglePositions[ti + 7] = ky; trianglePositions[ti + 8] = kz;

                  const tci = triIdx * 12;
                  for (let v = 0; v < 3; v++) {
                    triangleColors[tci + v * 4] = baseColor.r * 0.7;
                    triangleColors[tci + v * 4 + 1] = baseColor.g * 0.8;
                    triangleColors[tci + v * 4 + 2] = baseColor.b;
                    triangleColors[tci + v * 4 + 3] = tAlpha;
                  }
                  triIdx++;
                  break;
                }
              }
            }
          }
        }
      }

      // Zero out unused
      for (let i = lineIdx * 6; i < linePositions.length; i++) linePositions[i] = 0;
      for (let i = lineIdx * 8; i < lineColors.length; i++) lineColors[i] = 0;
      for (let i = triIdx * 9; i < trianglePositions.length; i++) trianglePositions[i] = 0;
      for (let i = triIdx * 12; i < triangleColors.length; i++) triangleColors[i] = 0;

      lineGeometry.attributes.position.needsUpdate = true;
      lineGeometry.attributes.color.needsUpdate = true;
      triGeometry.attributes.position.needsUpdate = true;
      triGeometry.attributes.color.needsUpdate = true;
    }

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      // Move particles
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const i3 = i * 3;
        particlePositions[i3] += particleVelocities[i3] + Math.sin(t * 0.3 + i) * 0.003;
        particlePositions[i3 + 1] += particleVelocities[i3 + 1] + Math.cos(t * 0.2 + i) * 0.003;
        particlePositions[i3 + 2] += particleVelocities[i3 + 2] + Math.sin(t * 0.4 + i * 0.5) * 0.002;

        // Bounce
        for (let a = 0; a < 3; a++) {
          if (particlePositions[i3 + a] > halfSpread) {
            particlePositions[i3 + a] = halfSpread;
            particleVelocities[i3 + a] *= -1;
          } else if (particlePositions[i3 + a] < -halfSpread) {
            particlePositions[i3 + a] = -halfSpread;
            particleVelocities[i3 + a] *= -1;
          }
        }
      }

      dotGeometry.attributes.position.needsUpdate = true;
      updateConnections();

      // Auto camera movement during recording
      if (!isRecording) {
        controls.update();
      } else {
        const angle = (t - recordStartTime) * 0.3;
        camera.position.x = Math.sin(angle) * 45;
        camera.position.z = Math.cos(angle) * 45;
        camera.position.y = Math.sin(angle * 0.5) * 10;
        camera.lookAt(0, 0, 0);
      }

      renderer.render(scene, camera);
    }

    animate();

    // ─── Recording / Export ───
    const btnRecord = document.getElementById('btnRecord');
    const btnScreenshot = document.getElementById('btnScreenshot');
    const statusEl = document.getElementById('status');
    const timerEl = document.getElementById('timer');

    function showStatus(msg, duration = 3000) {
      statusEl.textContent = msg;
      statusEl.classList.add('visible');
      setTimeout(() => statusEl.classList.remove('visible'), duration);
    }

    let muxer = null;
    let videoEncoder = null;
    let frameCount = 0;
    let recordingRAF = null;

    function updateTimer() {
      const secs = Math.floor((Date.now() - recordStartReal) / 1000);
      const m = String(Math.floor(secs / 60)).padStart(2, '0');
      const s = String(secs % 60).padStart(2, '0');
      timerEl.textContent = `${m}:${s}`;
    }

    btnRecord.addEventListener('click', () => {
      if (!isRecording) {
        startRecording();
      } else {
        stopRecording();
      }
    });

    async function startRecording() {
      const durSec = parseInt(document.getElementById('duration').value) || 10;
      const res = document.getElementById('resolution').value.split('x');
      const fps = parseInt(document.getElementById('fps').value) || 30;
      const w = parseInt(res[0]), h = parseInt(res[1]);

      // Resize renderer for recording
      renderer.setSize(w, h);
      renderer.setPixelRatio(1);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();

      // Setup MP4 muxer
      const target = new ArrayBufferTarget();
      muxer = new Muxer({
        target,
        video: {
          codec: 'avc',
          width: w,
          height: h
        },
        fastStart: 'in-memory'
      });

      // Setup VideoEncoder (WebCodecs API)
      videoEncoder = new VideoEncoder({
        output: (chunk, meta) => muxer.addVideoChunk(chunk, meta),
        error: (e) => console.error('Encoder error:', e)
      });

      videoEncoder.configure({
        codec: 'avc1.640028',
        width: w,
        height: h,
        bitrate: 8_000_000,
        framerate: fps
      });

      frameCount = 0;
      recordStartTime = clock.getElapsedTime();
      recordStartReal = Date.now();
      isRecording = true;

      btnRecord.textContent = 'Detener';
      btnRecord.classList.add('recording');
      timerEl.classList.add('visible');
      timerInterval = setInterval(updateTimer, 500);
      showStatus(`Grabando ${durSec}s a ${w}×${h} @ ${fps}fps...`, durSec * 1000);

      const frameDuration = 1_000_000 / fps; // microseconds
      const totalFrames = durSec * fps;

      function captureFrame() {
        if (!isRecording || frameCount >= totalFrames) {
          finishRecording(target, w, h);
          return;
        }

        renderer.render(scene, camera);
        const bitmap = renderer.domElement.transferToImageBitmap
          ? renderer.domElement.transferToImageBitmap()
          : null;

        if (bitmap) {
          const frame = new VideoFrame(bitmap, {
            timestamp: frameCount * frameDuration,
            duration: frameDuration
          });
          const keyFrame = frameCount % (fps * 2) === 0;
          videoEncoder.encode(frame, { keyFrame });
          frame.close();
        } else {
          // Fallback: create VideoFrame from canvas directly
          const frame = new VideoFrame(renderer.domElement, {
            timestamp: frameCount * frameDuration,
            duration: frameDuration
          });
          const keyFrame = frameCount % (fps * 2) === 0;
          videoEncoder.encode(frame, { keyFrame });
          frame.close();
        }

        frameCount++;
        recordingRAF = requestAnimationFrame(captureFrame);
      }

      captureFrame();

      // Auto-stop after duration
      setTimeout(() => {
        if (isRecording) stopRecording();
      }, durSec * 1000);
    }

    async function finishRecording(target, w, h) {
      showStatus('Finalizando MP4...', 10000);
      await videoEncoder.flush();
      muxer.finalize();

      const buf = target.buffer;
      const blob = new Blob([buf], { type: 'video/mp4' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `plexus-animation-${Date.now()}.mp4`;
      a.click();
      URL.revokeObjectURL(url);

      showStatus('MP4 guardado correctamente');

      // Restore size
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    }

    function stopRecording() {
      if (!isRecording) return;
      isRecording = false;
      if (recordingRAF) cancelAnimationFrame(recordingRAF);
      btnRecord.textContent = 'Grabar MP4';
      btnRecord.classList.remove('recording');
      timerEl.classList.remove('visible');
      clearInterval(timerInterval);
    }

    // Screenshot
    btnScreenshot.addEventListener('click', () => {
      renderer.render(scene, camera);
      const link = document.createElement('a');
      link.download = `plexus-screenshot-${Date.now()}.png`;
      link.href = renderer.domElement.toDataURL('image/png');
      link.click();
      showStatus('Captura guardada');
    });

    // Resize
    window.addEventListener('resize', () => {
      if (isRecording) return;
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>

</html>
